<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cibao Spa Laser - Sistema de Mantenimientos</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap');
    :root{
      --navy:#071d35;
      --navy-2:#0b2c4d;
      --cyan:#16c6d4;
      --cyan-2:#0ba7b8;
      --pink:#f59abc;
      --bg:#f4f8fb;
      --panel:#ffffff;
      --line:#dbe7ef;
      --text:#142234;
      --muted:#607184;
      --danger:#dc3545;
      --warning:#f59f00;
      --success:#18a058;
      --shadow:0 14px 38px rgba(7,29,53,.10);
      --radius:14px;
      --font-body:"Inter",Segoe UI,Arial,sans-serif;
      --font-heading:"Plus Jakarta Sans","Inter",Segoe UI,Arial,sans-serif;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:var(--font-body);background:var(--bg);color:var(--text);font-feature-settings:"cv02","cv03","cv04","cv11"}
    button,input,select,textarea{font:inherit}
    button{cursor:pointer}
    .app{min-height:100vh;display:flex}
    .sidebar{position:fixed;inset:0 auto 0 0;width:282px;background:linear-gradient(180deg,var(--navy),#06172b);color:white;z-index:30;display:flex;flex-direction:column;box-shadow:18px 0 45px rgba(7,29,53,.16)}
    .brand{display:flex;align-items:center;gap:12px;padding:18px;border-bottom:1px solid rgba(255,255,255,.12)}
    .logo{width:48px;height:48px;display:grid;place-items:center;border-radius:15px;background:white;overflow:hidden;box-shadow:0 10px 25px rgba(0,0,0,.20);flex:0 0 auto}
    .logo img{width:100%;height:100%;object-fit:contain;padding:4px}
    .brand h1{font-family:var(--font-heading);font-size:15px;margin:0;letter-spacing:.2px}
    .brand p{margin:3px 0 0;color:#a9c0d5;font-size:12px}
    .nav{padding:14px 12px;overflow:auto;flex:1}
    .nav-section{margin:16px 0 7px;padding:0 10px;color:#89a5bf;font-size:11px;font-weight:800;letter-spacing:.12em;text-transform:uppercase}
    .nav button{width:100%;display:flex;align-items:center;gap:10px;border:0;background:transparent;color:#dceaf6;border-radius:10px;padding:10px 11px;text-align:left;font-family:var(--font-heading);font-weight:700;font-size:14px;transition:.16s}
    .nav button:hover{background:rgba(255,255,255,.08);color:white}
    .nav button.active{background:linear-gradient(90deg,rgba(22,198,212,.24),rgba(22,198,212,.08));color:white;box-shadow:inset 3px 0 0 var(--cyan)}
    .nav .ico{width:20px;text-align:center;color:var(--cyan)}
    .badge-new{margin-left:auto;background:var(--pink);color:#611c36;border-radius:999px;padding:3px 8px;font-size:10px;font-weight:900;letter-spacing:.08em}
    .sidebar-foot{padding:14px 18px;border-top:1px solid rgba(255,255,255,.12);font-size:11px;color:#9db4c9}
    .main{margin-left:282px;width:calc(100% - 282px);min-height:100vh}
    .topbar{position:sticky;top:0;z-index:20;background:rgba(255,255,255,.88);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:16px;padding:14px 22px}
    .menu-btn{display:none}
    .title-wrap{flex:1;min-width:0}
    .title-wrap h2{font-family:var(--font-heading);margin:0;font-size:22px;color:var(--navy);letter-spacing:-.02em}
    .title-wrap p{margin:3px 0 0;color:var(--muted);font-size:13px}
    .header-logo{display:flex;align-items:center;gap:8px;color:var(--navy);font-weight:900;font-size:13px}
    .header-logo img{width:56px;height:34px;border-radius:8px;background:white;object-fit:contain;border:1px solid var(--line);padding:2px}
    .content{padding:22px;max-width:1480px;margin:0 auto}
    .grid{display:grid;gap:16px}
    .grid-2{grid-template-columns:repeat(2,minmax(0,1fr))}
    .grid-3{grid-template-columns:repeat(3,minmax(0,1fr))}
    .grid-4{grid-template-columns:repeat(4,minmax(0,1fr))}
    .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
    .card-head{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:16px 18px;border-bottom:1px solid var(--line)}
    .card-head h3{font-family:var(--font-heading);margin:0;color:var(--navy);font-size:16px;letter-spacing:-.01em}
    .card-body{padding:18px}
    .kpi{padding:18px;position:relative;overflow:hidden}
    .kpi:after{content:"";position:absolute;right:-25px;top:-25px;width:90px;height:90px;background:rgba(22,198,212,.13);border-radius:999px}
    .kpi .label{color:var(--muted);font-size:13px;font-weight:700}
    .kpi .value{font-family:var(--font-heading);font-size:30px;font-weight:900;color:var(--navy);margin-top:7px;letter-spacing:-.03em}
    .kpi .sub{font-size:12px;color:var(--muted);margin-top:4px}
    .btn{border:1px solid var(--line);background:white;color:var(--navy);border-radius:10px;padding:9px 12px;font-weight:800;font-size:13px;display:inline-flex;align-items:center;justify-content:center;gap:7px;transition:.16s}
    .btn:hover{border-color:var(--cyan);color:var(--cyan-2)}
    .btn.primary{background:linear-gradient(135deg,var(--navy),var(--navy-2));border-color:var(--navy);color:white}
    .btn.primary:hover{filter:brightness(1.05);color:white}
    .btn.accent{background:var(--cyan);border-color:var(--cyan);color:#042233}
    .btn.danger{background:#fff0f2;border-color:#ffd4dc;color:var(--danger)}
    .btn.ghost{background:transparent}
    .btn.sm{padding:6px 8px;font-size:12px;border-radius:8px}
    .btn.icon{width:33px;height:33px;padding:0}
    .toolbar{display:flex;align-items:end;gap:10px;flex-wrap:wrap}
    .field{display:flex;flex-direction:column;gap:6px}
    label{font-size:12px;font-weight:800;color:#37506a}
    input,select,textarea{width:100%;border:1px solid #cedbe6;background:white;border-radius:10px;padding:10px 11px;color:var(--text);outline:none}
    textarea{min-height:88px;resize:vertical}
    input:focus,select:focus,textarea:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(22,198,212,.15)}
    .table-wrap{overflow:auto;border-radius:0 0 var(--radius) var(--radius)}
    table{width:100%;border-collapse:collapse;min-width:760px}
    th{background:#eef6fa;color:#35516c;text-align:left;font-size:12px;text-transform:uppercase;letter-spacing:.04em;padding:12px;border-bottom:1px solid var(--line);white-space:nowrap}
    td{padding:12px;border-bottom:1px solid #edf3f7;vertical-align:top;font-size:14px}
    tr:hover td{background:#fbfdfe}
    .actions{display:flex;justify-content:flex-end;gap:5px;white-space:nowrap}
    .pill{display:inline-flex;align-items:center;gap:5px;border-radius:999px;padding:4px 9px;font-size:12px;font-weight:900;border:1px solid transparent}
    .pill.ok{background:#e8f7ef;color:#0c7b42}
    .pill.off{background:#f0f3f6;color:#607184}
    .pill.warn{background:#fff7df;color:#9b6500}
    .pill.bad{background:#ffecef;color:#ba2232}
    .pill.info{background:#e7fbfd;color:#087d8b}
    .tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
    .tabs button{border:1px solid var(--line);background:white;border-radius:999px;padding:9px 13px;font-weight:900;color:#3c556f}
    .tabs button.active{background:var(--navy);border-color:var(--navy);color:white}
    .pulse-shell{display:grid;grid-template-columns:230px minmax(0,1fr);gap:16px}
    .pulse-menu{background:var(--navy);border-radius:var(--radius);padding:10px;align-self:start;position:sticky;top:88px}
    .pulse-menu button{width:100%;text-align:left;border:0;background:transparent;color:#d6e7f4;border-radius:10px;padding:11px 12px;font-weight:800}
    .pulse-menu button.active,.pulse-menu button:hover{background:rgba(22,198,212,.18);color:white}
    .modal-backdrop{position:fixed;inset:0;background:rgba(7,29,53,.45);display:none;align-items:center;justify-content:center;z-index:80;padding:18px}
    .modal-backdrop.show{display:flex}
    .modal{background:white;border-radius:18px;box-shadow:0 30px 80px rgba(0,0,0,.25);width:min(820px,100%);max-height:92vh;overflow:auto}
    .modal-head{display:flex;justify-content:space-between;align-items:center;padding:16px 18px;border-bottom:1px solid var(--line)}
    .modal-head h3{margin:0;color:var(--navy)}
    .modal-body{padding:18px}
    .modal-foot{padding:14px 18px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:8px}
    .toast{position:fixed;right:18px;bottom:18px;z-index:100;display:grid;gap:8px}
    .toast div{background:var(--navy);color:white;padding:12px 14px;border-radius:12px;box-shadow:var(--shadow);font-weight:800;max-width:360px}
    .toast .error{background:#9f1d2e}
    .toast .success{background:#0c7b42}
    .empty{padding:38px;text-align:center;color:var(--muted)}
    .split{display:grid;grid-template-columns:1.1fr .9fr;gap:16px}
    .section-title{font-size:13px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:900;margin:10px 0}
    .piece-row{display:flex;align-items:start;justify-content:space-between;gap:12px;padding:12px;border:1px solid var(--line);border-radius:12px;background:#fbfdfe;margin-top:8px}
    .mobile-overlay{display:none}
    @media(max-width:1050px){
      .grid-4{grid-template-columns:repeat(2,minmax(0,1fr))}
      .grid-3{grid-template-columns:repeat(2,minmax(0,1fr))}
      .split,.pulse-shell{grid-template-columns:1fr}
      .pulse-menu{position:static}
    }
    @media(max-width:760px){
      .sidebar{transform:translateX(-100%);transition:.22s}
      body.sidebar-open .sidebar{transform:translateX(0)}
      .mobile-overlay{display:block;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:25;opacity:0;pointer-events:none}
      body.sidebar-open .mobile-overlay{opacity:1;pointer-events:auto}
      .main{margin-left:0;width:100%}
      .menu-btn{display:inline-flex}
      .header-logo{display:none}
      .content{padding:14px}
      .topbar{padding:12px 14px}
      .grid-2,.grid-3,.grid-4{grid-template-columns:1fr}
      .title-wrap h2{font-size:18px}
      .toolbar .field{width:100%}
      .toolbar .btn{width:100%}
      table{min-width:680px}
    }
  </style>
</head>
<body>
  <div class="mobile-overlay" onclick="document.body.classList.remove('sidebar-open')"></div>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="logo" aria-label="Logo Cibao Spa Laser">
          <img src="https://csl-app-eta.vercel.app/cibao-spa-laser-logo.jpeg" alt="Cibao Spa Laser">
        </div>
        <div>
          <h1>Cibao Spa Laser</h1>
          <p>Mantenimientos CSL</p>
        </div>
      </div>
      <nav class="nav" id="sideNav"></nav>
      <div class="sidebar-foot">v Pro Pulse · Google Apps Script</div>
    </aside>
    <section class="main">
      <header class="topbar">
        <button class="btn icon menu-btn" onclick="document.body.classList.add('sidebar-open')" title="Abrir menu">☰</button>
        <div class="title-wrap">
          <h2 id="pageTitle">Dashboard</h2>
          <p id="pageDesc">Resumen operativo y técnico</p>
        </div>
        <div class="header-logo"><img src="https://csl-app-eta.vercel.app/cibao-spa-laser-logo.jpeg" alt="Cibao Spa Laser"><span>Cibao Spa Laser</span></div>
        <button class="btn" id="refreshBtn" onclick="loadAllData()">↻ Actualizar</button>
      </header>
      <main class="content" id="content"></main>
    </section>
  </div>
  <div class="modal-backdrop" id="modalRoot"></div>
  <div class="toast" id="toast"></div>

  <script>
    const CURRENT_VERSION = "CSL_UI_PRO_PULSE_2026_05_08";
    const $ = (id) => document.getElementById(id);
    const today = () => new Date().toISOString().slice(0, 10);
    const esc = (v) => String(v ?? "").replace(/[&<>"']/g, (m) => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;" }[m]));
    const num = (v) => Number(String(v ?? 0).replace(/[^\d.-]/g, "")) || 0;
    const fmtNum = (v) => num(v).toLocaleString("en-US");
    const fmtMoney = (v) => num(v).toLocaleString("en-US", { minimumFractionDigits: 0 });
    const fmtDate = (value) => {
      const raw = String(value || "").trim();
      if (!raw) return "-";
      const iso = raw.match(/^(\d{4})-(\d{2})-(\d{2})/);
      if (iso) return `${iso[3]}/${iso[2]}/${iso[1]}`;
      const local = raw.match(/^(\d{1,2})[/-](\d{1,2})[/-](\d{4})/);
      if (local) return `${local[1].padStart(2,"0")}/${local[2].padStart(2,"0")}/${local[3]}`;
      const d = new Date(raw);
      return Number.isNaN(d.getTime()) ? raw : d.toLocaleDateString("es-DO", { day:"2-digit", month:"2-digit", year:"numeric" });
    };
    const isoDate = (value) => {
      const raw = String(value || "").trim();
      const iso = raw.match(/^(\d{4})-(\d{2})-(\d{2})/);
      if (iso) return `${iso[1]}-${iso[2]}-${iso[3]}`;
      const local = raw.match(/^(\d{1,2})[/-](\d{1,2})[/-](\d{4})/);
      if (local) return `${local[3]}-${local[2].padStart(2,"0")}-${local[1].padStart(2,"0")}`;
      return raw || today();
    };
    const parseJson = (txt, fallback=[]) => { try { const v = JSON.parse(txt || ""); return Array.isArray(v) ? v : fallback; } catch { return fallback; } };
    const idFor = (prefix) => `${prefix}-${Date.now()}-${Math.random().toString(36).slice(2,7).toUpperCase()}`;

    const NAV = [
      { section:"INICIO", items:[{ id:"dashboard", label:"Dashboard", icon:"▣" }] },
      { section:"GESTIÓN", items:[{ id:"sucursales", label:"Sucursales", icon:"⌂" }, { id:"equipos", label:"Equipos", icon:"⚙" }, { id:"tecnicos", label:"Técnicos", icon:"U" }] },
      { section:"MANTENIMIENTO", items:[{ id:"nuevo-reporte", label:"Nuevo reporte", icon:"＋" }, { id:"reportes", label:"Lista de reportes", icon:"☷" }, { id:"historial", label:"Historial por equipo", icon:"◎" }] },
      { section:"LÁSER", items:[{ id:"pulse", label:"PulseControl CSL", icon:"P", new:true }] },
      { section:"CONSENTIMIENTOS", items:[{ id:"consent-masajes", label:"Consentimiento Masajes", icon:"?" }, { id:"consent-tatuajes-cejas", label:"Eliminaci?n Tatuajes y Cejas", icon:"?" }] },
      { section:"CATÁLOGO TÉCNICO", items:[{ id:"catalogo", label:"Errores y piezas", icon:"◇" }] },
      { section:"SISTEMA", items:[{ id:"config", label:"Configuración", icon:"⚙" }] },
    ];
    const TITLES = {
      dashboard:["Dashboard","Resumen operativo, alertas y tendencias de mantenimiento"],
      sucursales:["Sucursales","Gestión de sedes activas e inactivas"],
      equipos:["Equipos","Inventario técnico, pulsos e historial por equipo"],
      tecnicos:["Técnicos","Personal técnico disponible para reportes"],
      "nuevo-reporte":["Nuevo reporte","Registro de mantenimiento, piezas intervenidas y cierre técnico"],
      reportes:["Lista de reportes","Consulta, edición, filtros e impresión de reportes"],
      historial:["Historial por equipo","Resumen histórico de mantenimientos y fallos"],
      pulse:["PulseControl CSL","Control interno de pulsos GentleYAG"],
      "consent-masajes":["Consentimiento Masajes","Registro, firmas e impresi?n de consentimientos"],
      "consent-tatuajes-cejas":["Consentimiento Eliminaci?n de Tatuajes y Cejas","Autorizaci?n informada para procedimientos l?ser"],
      catalogo:["Errores y piezas","Catálogo técnico de fallas, piezas y criticidad"],
      config:["Configuración","Conexión con Google Apps Script y diagnóstico"],
    };

    const defaultState = () => ({
      active:"dashboard",
      pulseTab:"dashboard",
      apiUrl: localStorage.getItem("csl_api_url") || "",
      connected:false,
      formReport: null,
      pieceDrafts: [],
      db: {
        sucursales: [
          { Codigo:"RV", Nombre:"Rafael Vidal", Ciudad:"Santiago", Direccion:"Av. Rafael Vidal, Santiago", Estado:"Activa", Notas:"", Correo:"" },
          { Codigo:"LJ", Nombre:"Los Jardines", Ciudad:"Santiago", Direccion:"Los Jardines Metropolitanos", Estado:"Activa", Notas:"", Correo:"" },
          { Codigo:"VO", Nombre:"Villa Olga", Ciudad:"Santiago", Direccion:"Villa Olga", Estado:"Activa", Notas:"", Correo:"" },
          { Codigo:"LV", Nombre:"La Vega", Ciudad:"La Vega", Direccion:"La Vega", Estado:"Activa", Notas:"", Correo:"" },
        ],
        equipos: [],
        tecnicos: [],
        reportes: [],
        piezas: [
          { Pieza:"Lámparas", Categoria:"Consumibles principales", Prioridad:"Alta", Tipo:"Consumible técnico", Funcion:"Fuente de disparo del sistema láser", FallasComunes:"Error 14.0, baja energía", Activa:"Si" },
          { Pieza:"Fibra óptica", Categoria:"Óptica", Prioridad:"Alta", Tipo:"No consumible crítico", Funcion:"Transmisión de energía", FallasComunes:"Error 15.1, pérdida de potencia", Activa:"Si" },
          { Pieza:"Filtro de agua", Categoria:"Hidráulico", Prioridad:"Media-Alta", Tipo:"Consumible", Funcion:"Filtrado del circuito de enfriamiento", FallasComunes:"Bajo flujo, temperatura alta", Activa:"Si" },
          { Pieza:"Handpiece", Categoria:"Aplicadores", Prioridad:"Alta", Tipo:"No consumible crítico", Funcion:"Aplicación del tratamiento", FallasComunes:"No detectado, slider defectuoso", Activa:"Si" },
          { Pieza:"Pedal", Categoria:"Control", Prioridad:"Media", Tipo:"No consumible", Funcion:"Activación del disparo", FallasComunes:"Error footswitch", Activa:"Si" },
        ],
        pulseEquipos: gentleYagEquipos(),
        pulseOperadoras: defaultOperadoras(),
        pulseLecturas: [],
        pulseServicios: [],
        pulseMantenimientos: [],
        consentMasajes: [],
        consentTatuajesCejas: []
      }
    });
    let state = defaultState();

    function gentleYagEquipos(){
      return [
        ["4","Rafael Vidal","Cabina 5","Rosa"],["6","Rafael Vidal","Cabina 4","Madelin"],["7","Rafael Vidal","Cabina 1","Diana"],["8","Rafael Vidal","Cabina 2","Emely"],
        ["9","Los Jardines","Cabina 4","YAMILKA"],["10","Los Jardines","Cabina 1","Katherine"],["11","Los Jardines","Cabina 3","NAYELI"],["13","Los Jardines","Cabina 2","Lilian"],
        ["17","Villa Olga","Cabina 1","Yessica"],["19","Villa Olga","Cabina 2","Eidylee"],["LV-01","La Vega","Cabina 1","Equipo La Vega"]
      ].map(([EquipoID,Sucursal,Cabina,Notas]) => ({ EquipoID, Nombre:`GentleYAG ${EquipoID}`, Sucursal, Cabina, Modelo:"Candela GentleYAG", Serie:"", Estado:"Activo", PulsosReferencia:0, Notas }));
    }
    function defaultOperadoras(){
      return [
        ["Rosa","Rafael Vidal"],["Madelin","Rafael Vidal"],["Diana","Rafael Vidal"],["Emely","Rafael Vidal"],["YAMILKA","Los Jardines"],
        ["Katherine","Los Jardines"],["NAYELI","Los Jardines"],["Lilian","Los Jardines"],["Yessica","Villa Olga"],["Eidylee","Villa Olga"]
      ].map(([Nombre,Sucursal]) => ({ OperadoraID:Nombre, Nombre, Sucursal, Estado:"Activa", Notas:"", FechaRegistro:today() }));
    }

    function toast(message, type="info"){
      const box = document.createElement("div");
      box.className = type;
      box.textContent = message;
      $("toast").appendChild(box);
      setTimeout(() => box.remove(), 3600);
    }

    function renderNav(){
      $("sideNav").innerHTML = NAV.map(group => `
        <div class="nav-section">${group.section}</div>
        ${group.items.map(item => `
          <button class="${state.active === item.id ? "active" : ""}" onclick="go('${item.id}')">
            <span class="ico">${item.icon}</span><span>${item.label}</span>${item.new ? '<span class="badge-new">NEW</span>' : ''}
          </button>
        `).join("")}
      `).join("");
    }

    function go(id){
      state.active = id;
      document.body.classList.remove("sidebar-open");
      render();
    }

    function render(){
      renderNav();
      const title = TITLES[state.active] || TITLES.dashboard;
      $("pageTitle").textContent = title[0];
      $("pageDesc").textContent = title[1];
      $("refreshBtn").style.display = state.active === "pulse" ? "none" : "";
      const views = {
        dashboard: renderDashboard,
        sucursales: () => renderCrud("sucursales"),
        equipos: () => renderCrud("equipos"),
        tecnicos: () => renderCrud("tecnicos"),
        "nuevo-reporte": renderNuevoReporte,
        reportes: renderReportes,
        historial: renderHistorial,
        catalogo: renderCatalogo,
        pulse: renderPulse,
        "consent-masajes": () => renderConsentimientos("masajes"),
        "consent-tatuajes-cejas": () => renderConsentimientos("tatuajes"),
        config: renderConfig
      };
      $("content").innerHTML = (views[state.active] || renderDashboard)();
      if (state.active === "reportes") setTimeout(renderReportTable, 0);
    }

    function apiUrl(){
      return String(state.apiUrl || localStorage.getItem("csl_api_url") || "").trim();
    }

    function isGoogleScript(url){
      return /script\.google\.com|\/macros\/s\//i.test(url);
    }

    function api(action, payload={}){
      const url = apiUrl();
      if (!url) return Promise.reject(new Error("Configura la URL del Apps Script primero."));
      const params = { action, ...payload };
      if (isGoogleScript(url)) return jsonp(url, params);
      return fetch(url, {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body:JSON.stringify(params)
      }).then(async r => {
        const txt = await r.text();
        try { return JSON.parse(txt); } catch { throw new Error("La respuesta no es JSON válido: " + txt.slice(0, 160)); }
      });
    }

    function jsonp(url, params){
      return new Promise((resolve, reject) => {
        const cb = "csl_cb_" + Date.now() + "_" + Math.random().toString(36).slice(2);
        const qs = new URLSearchParams();
        Object.entries(params).forEach(([k,v]) => {
          if (v === undefined || v === null) return;
          qs.set(k, typeof v === "object" ? JSON.stringify(v) : String(v));
        });
        qs.set("callback", cb);
        const script = document.createElement("script");
        const timer = setTimeout(() => cleanup(new Error("Timeout conectando con Apps Script")), 25000);
        window[cb] = (data) => cleanup(null, data);
        function cleanup(err, data){
          clearTimeout(timer);
          delete window[cb];
          script.remove();
          err ? reject(err) : resolve(data);
        }
        script.onerror = () => cleanup(new Error("No se pudo conectar. Verifica la URL y permisos del Apps Script."));
        script.src = url + (url.includes("?") ? "&" : "?") + qs.toString();
        document.body.appendChild(script);
      });
    }

    function kpi(label,value,sub){ return `<div class="card kpi"><div class="label">${label}</div><div class="value">${fmtNum(value)}</div><div class="sub">${sub || ""}</div></div>`; }
    function tableCard(title, headers, rows){
      return `<div class="card"><div class="card-head"><h3>${title}</h3></div><div class="table-wrap"><table><thead><tr>${headers.map(h=>`<th>${h}</th>`).join("")}</tr></thead><tbody>${rows.length ? rows.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join("")}</tr>`).join("") : `<tr><td colspan="${headers.length}" class="empty">Sin datos disponibles</td></tr>`}</tbody></table></div></div>`;
    }
    function topBy(rows, key, limit){
      const map = {};
      rows.forEach(r => { const k = r[key] || "Sin dato"; map[k] = (map[k] || 0) + 1; });
      return Object.entries(map).map(([key,count]) => ({key,count})).sort((a,b)=>b.count-a.count).slice(0,limit);
    }
    function lastReportDate(equipoId){
      return state.db.reportes.filter(r => String(r.EquipoID) === String(equipoId)).sort((a,b)=>String(b.Fecha).localeCompare(String(a.Fecha)))[0]?.Fecha || "";
    }
    function topPieces(limit){
      const map = {};
      state.db.reportes.forEach(r => parseJson(r.PiezasJSON).forEach(p => {
        const key = p.pieza || p.Pieza || "Sin pieza";
        map[key] ||= { pieza:key, usos:0, reemplazos:0 };
        map[key].usos++;
        if (String(p.reemplazo || p.Reemplazo).toLowerCase().startsWith("s")) map[key].reemplazos++;
      }));
      return Object.values(map).sort((a,b)=>b.usos-a.usos).slice(0,limit);
    }

    function formatCell(c,v){
      if (/Fecha/.test(c)) return fmtDate(v);

      if (c === "Estado" || c === "EstadoEquipo" || c === "Prioridad") return statusPill(v);
      return esc(v || "-");

    function statusPill(v){
      const s = String(v || "-");

      openModal(`${index === undefined ? "Nuevo" : "Editar"} ${cfg.title}`, `

    function fieldHtml(name,label,type,value=""){
      if (type === "textarea") return `<div class="field" style="grid-column:1/-1"><label>${label}</label><textarea name="${name}">${esc(value)}</textarea></div>`;
      if (type === "sucursal") return `<div class="field"><label>${label}</label><select name="${name}">${state.db.sucursales.map(s=>`<option ${s.Nombre===value?"selected":""}>${esc(s.Nombre)}</option>`).join("")}</select></div>`;
      if (type.startsWith("select:")) return `<div class="field"><label>${label}</label><select name="${name}">${type.slice(7).split("|").map(o=>`<option value="${esc(o)}" ${String(value||"")===o?"selected":""}>${esc(o)}</option>`).join("")}</select></div>`;
      return `<div class="field"><label>${label}</label><input name="${name}" type="${type}" value="${esc(value)}"></div>`;
    }
    async function saveCrud(type,index){
      const cfg = CRUD[type];
      const record = cfg.normalize(readForm("crudForm"));
      if (!record[cfg.key]) return toast(`Falta ${cfg.key}`, "error");
      if (index >= 0) record._rowNum = state.db[cfg.arr][index]._rowNum;
      if (index >= 0) state.db[cfg.arr][index] = record; else state.db[cfg.arr].push(record);
      closeModal(); render(); toast("Registro guardado", "success");
      try { await api(cfg.save, { payload: JSON.stringify(record) }); } catch(err){ toast("Guardado local. Backend pendiente: " + err.message, "error"); }
    }
    async function toggleCrud(type,index){
      const cfg = CRUD[type], row = state.db[cfg.arr][index];
      row.Estado = /Inact/i.test(row.Estado) ? (type==="sucursales" ? "Activa" : "Activo") : (type==="sucursales" ? "Inactiva" : "Inactivo");
      render();
      try { await api(cfg.estado, { id: row[cfg.key], codigo: row.Codigo, equipoId: row.EquipoID, estado: row.Estado, rowNum: row._rowNum }); } catch(err){ toast(err.message, "error"); }
    }
    async function deleteCrud(type,index){
      const cfg = CRUD[type], row = state.db[cfg.arr][index];
      if (!confirm(`Eliminar ${row[cfg.key]}?`)) return;
      state.db[cfg.arr].splice(index,1); render(); toast("Registro eliminado", "success");
      try { await api(cfg.del, { id: row[cfg.key], codigo: row.Codigo, equipoId: row.EquipoID, rowNum: row._rowNum }); } catch(err){ toast("Eliminado local. Backend pendiente: " + err.message, "error"); }
    }

      if (!r.EquipoID) return toast("Selecciona un equipo", "error");
      if (!r.Atendio) return toast("Selecciona un técnico", "error");
      const existingIndex = state.db.reportes.findIndex(x => x.ID && x.ID === state.formReport?.ID);
      const record = { ...r, ID: state.formReport?.ID || idFor("RPT"), PiezasJSON: JSON.stringify(state.pieceDrafts), PartesTexto: state.pieceDrafts.map(p=>p.pieza).join(", ") };
      if (existingIndex >= 0) state.db.reportes[existingIndex] = record; else state.db.reportes.push(record);
      state.formReport = null; state.pieceDrafts = []; go("reportes"); toast("Reporte guardado", "success");
      try { await api("saveReporte", { payload: JSON.stringify(record) }); } catch(err){ toast("Guardado local. Backend pendiente: " + err.message, "error"); }

    const CONSENT_CONFIG = {
      masajes:{ arr:"consentMasajes", key:"ConsentID", save:"saveConsentMasaje", del:"deleteConsentMasaje", title:"Consentimiento Masajes", prefix:"CM", extra:[["TipoMasaje","Tipo de masaje","text"],["ZonaTratar","Zona a tratar","text"],["Contraindicaciones","Contraindicaciones","textarea"],["Alergias","Alergias","textarea"],["EnfermedadesAntecedentes","Enfermedades o antecedentes","textarea"],["Embarazo","Embarazo","select:S?|No"]], text:"Declaro que he recibido informaci?n clara sobre el masaje a realizar, beneficios, posibles molestias, contraindicaciones y recomendaciones. Autorizo a Cibao Spa Laser a realizar el procedimiento descrito." },
      tatuajes:{ arr:"consentTatuajesCejas", key:"ConsentID", save:"saveConsentTatuajeCeja", del:"deleteConsentTatuajeCeja", title:"Consentimiento Eliminaci?n de Tatuajes y Cejas", prefix:"CTC", extra:[["TipoProcedimiento","Tipo de procedimiento","select:Eliminaci?n de tatuajes|Eliminaci?n de cejas"],["ZonaTratar","Zona a tratar","text"],["ColorPigmento","Color del pigmento","text"],["TiempoAproximado","Tiempo aproximado","text"],["SesionesExplicadas","Sesiones explicadas","text"],["RiesgosExplicados","Riesgos explicados","textarea"],["CuidadosAntes","Cuidados antes","textarea"],["CuidadosDespues","Cuidados despu?s","textarea"]], text:"Declaro que recib? explicaci?n del procedimiento l?ser, riesgos, cuidados y que entiendo que pueden requerirse varias sesiones. Autorizo a Cibao Spa Laser a realizar el tratamiento descrito." }
    };
    function renderConsentimientos(kind){
      const cfg = CONSENT_CONFIG[kind], rows = state.db[cfg.arr] || [];
      return `<div class="card"><div class="card-head"><h3>${cfg.title}</h3><button class="btn primary" onclick="openConsent('${kind}')">? Nuevo</button></div><div class="card-body"><div class="toolbar"><div class="field" style="min-width:260px"><label>Buscar cliente</label><input id="consentSearch" oninput="filterConsent('${kind}')" placeholder="Nombre, documento, tel?fono..."></div><div class="field"><label>Sucursal</label><select id="consentSucursal" onchange="filterConsent('${kind}')"><option value="">Todas</option>${state.db.sucursales.map(s=>`<option>${esc(s.Nombre)}</option>`).join("")}</select></div><div class="field"><label>Fecha</label><input id="consentFecha" type="date" onchange="filterConsent('${kind}')"></div></div></div><div class="table-wrap"><table><thead><tr><th>Fecha</th><th>Cliente</th><th>Sucursal</th><th>Tel?fono</th><th>Estado</th><th style="text-align:right">Acciones</th></tr></thead><tbody id="consentRows">${consentRows(kind, rows)}</tbody></table></div></div>`;
    }
    function consentRows(kind, rows){
      if(!rows.length) return '<tr><td colspan="6" class="empty">Sin consentimientos guardados.</td></tr>';
      return rows.map((r,i)=>`<tr><td>${fmtDate(r.Fecha || r.fecha)}</td><td><b>${esc(r.NombreCliente || r.nombreCliente || '-')}</b><br><small>${esc(r.Documento || r.documento || r.ConsentID || r.id || '')}</small></td><td>${esc(r.Sucursal || r.sucursal || '-')}</td><td>${esc(r.Telefono || r.telefono || '-')}</td><td>${statusPill(r.Estado || r.estado || 'Pendiente')}</td><td><div class="actions"><button class="btn icon" onclick="printConsent('${kind}',${i})">?</button><button class="btn icon" onclick="openConsent('${kind}',${i})">?</button><button class="btn icon danger" onclick="deleteConsent('${kind}',${i})">?</button></div></td></tr>`).join('');
    }
    function filterConsent(kind){
      const cfg=CONSENT_CONFIG[kind], q=($('consentSearch')?.value||'').toLowerCase(), s=$('consentSucursal')?.value||'', f=$('consentFecha')?.value||'';
      const rows=(state.db[cfg.arr]||[]).filter(r=>`${r.NombreCliente||r.nombreCliente||''} ${r.Documento||r.documento||''} ${r.Telefono||r.telefono||''}`.toLowerCase().includes(q) && (!s || (r.Sucursal||r.sucursal)===s) && (!f || (r.Fecha||r.fecha)===f));
      $('consentRows').innerHTML=consentRows(kind, rows);
    }
    function openConsent(kind,index){
      const cfg=CONSENT_CONFIG[kind], row=index===undefined?{ConsentID:idFor(cfg.prefix),Fecha:today(),Estado:'Pendiente',TextoConsentimiento:cfg.text}:state.db[cfg.arr][index];
      const fields=[["ConsentID","ID","text"],["Fecha","Fecha","date"],["Sucursal","Sucursal","sucursal"],["NombreCliente","Nombre del cliente","text"],["Documento","C?dula o documento","text"],["Telefono","Tel?fono","text"],["Correo","Correo","email"],["Direccion","Direcci?n","text"],["FechaNacimiento","Fecha nacimiento","date"],["Edad","Edad","number"],...cfg.extra,["Observaciones","Observaciones","textarea"],["NombreEspecialista","Nombre del especialista","text"],["Estado","Estado","select:Pendiente|Firmado|Anulado"],["TextoConsentimiento","Texto del consentimiento","textarea"],["FirmaCliente","Firma cliente","textarea"],["FirmaEspecialista","Firma especialista","textarea"]];
      openModal(`${index===undefined?'Nuevo':'Editar'} ${cfg.title}`, `<form id="consentForm" class="grid grid-2">${fields.map(f=>fieldHtml(f[0],f[1],f[2],row[f[0]]||'')).join('')}</form>`, `<button class="btn" onclick="closeModal()">Cancelar</button><button class="btn primary" onclick="saveConsent('${kind}',${index===undefined?-1:index})">Guardar</button>`);
    }
    async function saveConsent(kind,index){
      const cfg=CONSENT_CONFIG[kind], rec=readForm('consentForm'); if(!rec.ConsentID) rec.ConsentID=idFor(cfg.prefix); if(!rec.NombreCliente) return toast('Completa el cliente','error');
      if(index>=0) state.db[cfg.arr][index]=rec; else state.db[cfg.arr].unshift(rec); closeModal(); render(); toast('Consentimiento guardado','success');
      try{ await api(cfg.save,{ payload:JSON.stringify(rec), data:JSON.stringify(rec) }); }catch(err){ toast('Guardado local. Backend pendiente: '+err.message,'error'); }
    }
    async function deleteConsent(kind,index){
      const cfg=CONSENT_CONFIG[kind], row=state.db[cfg.arr][index]; if(!confirm('Eliminar consentimiento?')) return; state.db[cfg.arr].splice(index,1); render();
      try{ await api(cfg.del,{ id:row.ConsentID||row.id }); }catch(err){ toast(err.message,'error'); }
    }
    function printConsent(kind,index){
      const cfg=CONSENT_CONFIG[kind], r=state.db[cfg.arr][index]; const w=window.open('','_blank');
      w.document.write(`<html><head><title>${cfg.title}</title><style>@page{size:A4;margin:14mm}body{font-family:Arial;color:#111}h1{color:#008d81}.head{display:flex;gap:16px;border-bottom:3px solid #008d81;padding-bottom:12px}.logo{width:120px;object-fit:contain}.sec{border:1px solid #ccd6e0;margin-top:12px}.sec h3{margin:0;background:#008d81;color:white;padding:8px}.grid{display:grid;grid-template-columns:1fr 1fr}.f{padding:7px 10px;border-bottom:1px dotted #aaa}.txt{padding:12px;line-height:1.55;text-align:justify}.sig{height:120px;text-align:center;padding-top:40px}</style></head><body><div class="head"><img class="logo" src="https://csl-app-eta.vercel.app/cibao-spa-laser-logo.jpeg"><div><h1>${cfg.title}</h1><b>ID:</b> ${esc(r.ConsentID||r.id)}<br><b>Fecha:</b> ${fmtDate(r.Fecha||r.fecha)}</div></div><div class="sec"><h3>Datos del cliente</h3><div class="grid"><div class="f"><b>Cliente:</b> ${esc(r.NombreCliente||'')}</div><div class="f"><b>Documento:</b> ${esc(r.Documento||'')}</div><div class="f"><b>Tel?fono:</b> ${esc(r.Telefono||'')}</div><div class="f"><b>Sucursal:</b> ${esc(r.Sucursal||'')}</div></div></div><div class="sec"><h3>Consentimiento</h3><div class="txt">${esc(r.TextoConsentimiento||cfg.text)}</div></div><div class="sec"><h3>Firmas</h3><div class="grid"><div class="sig">Firma cliente<br>${esc(r.FirmaCliente||'')}</div><div class="sig">Firma especialista<br>${esc(r.FirmaEspecialista||'')}</div></div></div><script>setTimeout(()=>print(),300)<\/script></body></html>`); w.document.close();
    }

    function renderConfig(){
      return `<div class="grid grid-2"><div class="card"><div class="card-head"><h3>Backend Google Apps Script</h3><span class="pill ${state.connected?"ok":"off"}">${state.connected?"Conectado":"Sin verificar"}</span></div><div class="card-body">
        <div class="field"><label>URL del Apps Script</label><input id="apiInput" value="${esc(apiUrl())}" placeholder="https://script.google.com/macros/s/.../exec"></div>
        <div class="toolbar" style="margin-top:14px"><button class="btn primary" onclick="saveApiUrl()">Guardar URL</button><button class="btn" onclick="testConnection()">Probar conexión</button><button class="btn accent" onclick="setupBackend()">Inicializar hojas</button><button class="btn" onclick="loadAllData()">Cargar datos</button></div>
      </div></div><div class="card"><div class="card-head"><h3>Diagnóstico</h3></div><div class="card-body"><p><b>Versión UI:</b> ${CURRENT_VERSION}</p><p><b>Hojas requeridas:</b> Sucursales, Equipos, Tecnicos, Reportes, CatalogoPiezas, PulseEquipos, PulseOperadoras, PulseLecturas, PulseServicios, PulseMantenimientos.</p><p><b>PulseControl:</b> integrado en menú Láser y con botón Actualizar oculto.</p></div></div></div>`;
    }
    function saveApiUrl(){ state.apiUrl = $("apiInput").value.trim(); localStorage.setItem("csl_api_url", state.apiUrl); toast("URL guardada", "success"); }

    function openModal(title, body, foot){
      $("modalRoot").innerHTML = `<div class="modal"><div class="modal-head"><h3>${title}</h3><button class="btn icon" onclick="closeModal()">×</button></div><div class="modal-body">${body}</div><div class="modal-foot">${foot || '<button class="btn" onclick="closeModal()">Cerrar</button>'}</div></div>`;
      $("modalRoot").classList.add("show");
    }
    function closeModal(){ $("modalRoot").classList.remove("show"); $("modalRoot").innerHTML = ""; }
    $("modalRoot").addEventListener("click", (e) => { if (e.target.id === "modalRoot") closeModal(); });

    render();
  </script>
</body>
</html>
